[package]
name = "sparticles"
version = "0.1.0"
edition = "2021"

[dependencies]
winit = "0.26"
env_logger = "0.9"
log = "0.4"
wgpu = "0.13"
pollster = "0.2"
bytemuck = { version = "1.4", features = [ "derive" ] }
anyhow = "1.0" 
cgmath = "0.18"
rand = "0.8"

[dependencies.image]
version = "0.24"
default-features = false
features = ["png", "jpeg"]
